<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Alunos - Mackenzie</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: #8B0000;
      color: white;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .logo-text { font-size: 22px; font-weight: bold; letter-spacing: 1px; }
    header .subtitle { font-size: 13px; opacity: 0.85; }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      background: white;
      padding: 36px 32px;
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      width: 100%;
      max-width: 460px;
    }

    .card h2 {
      text-align: center;
      color: #8B0000;
      margin-bottom: 6px;
      font-size: 22px;
    }

    .card p.descricao {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: bold;
      color: #444;
      margin-top: 14px;
      margin-bottom: 5px;
      font-size: 14px;
    }

    input {
      width: 100%;
      padding: 10px 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 15px;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: #8B0000;
      box-shadow: 0 0 0 2px rgba(139,0,0,0.1);
    }

    .email-hint {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    button[type="submit"] {
      width: 100%;
      margin-top: 22px;
      padding: 13px;
      border: none;
      background-color: #8B0000;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button[type="submit"]:hover { background-color: #6b0000; }
    button[type="submit"]:disabled { background-color: #aaa; cursor: not-allowed; }

    .mensagem {
      margin-top: 18px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
      display: none;
    }

    .mensagem.sucesso {
      background-color: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
      display: block;
    }

    .mensagem.erro {
      background-color: #fde8e8;
      color: #c0392b;
      border: 1px solid #f5c6c6;
      display: block;
    }

    .link-login {
      margin-top: 18px;
      text-align: center;
      font-size: 13px;
      color: #666;
    }

    .link-login a {
      color: #8B0000;
      text-decoration: none;
      font-weight: bold;
    }

    .link-login a:hover { text-decoration: underline; }

    footer {
      text-align: center;
      padding: 16px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <div class="logo-text">MACKENZIE</div>
      <div class="subtitle">Sistema de Gestão APO</div>
    </div>
  </header>

  <main>
    <div class="card">
      <h2>Cadastro de Aluno</h2>
      <p class="descricao">Preencha os dados para criar sua conta no sistema APO.</p>

      <form id="formAluno">
        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" placeholder="Seu nome completo" required>

        <label for="email">Email Mackenzista</label>
        <input type="email" id="email" placeholder="seuemail@mackenzista.com.br" required>
        <div class="email-hint">Use seu email @mackenzista.com.br ou @mackenzie.br</div>

        <label for="matricula">Matrícula</label>
        <input type="text" id="matricula" placeholder="Ex: 10012345" required>

        <label for="curso">Curso</label>
        <input type="text" id="curso" placeholder="Ex: Ciência da Computação" required>

        <button type="submit" id="btnCadastrar">Cadastrar</button>
      </form>

      <div id="mensagem" class="mensagem"></div>

      <div class="link-login">
        Já tem cadastro? <a href="./login.html">Fazer login</a>
      </div>
    </div>
  </main>

  <footer>&copy; 2025 Universidade Presbiteriana Mackenzie &mdash; Sistema APO</footer>

  <script>
    function getApiBaseUrl() {
      const customBaseUrl = localStorage.getItem('apiBaseUrl');
      if (customBaseUrl) return customBaseUrl.replace(/\/$/, '');

      const isJetBrainsPreview = window.location.port === '63342';
      const isFileProtocol = window.location.protocol === 'file:';
      return (isJetBrainsPreview || isFileProtocol)
        ? 'http://localhost:8080'
        : '';
    }

    const apiBaseUrl = getApiBaseUrl();

    const form = document.getElementById('formAluno');
    const mensagemEl = document.getElementById('mensagem');
    const btnCadastrar = document.getElementById('btnCadastrar');

    form.addEventListener('submit', async function (event) {
      event.preventDefault();

      const email = document.getElementById('email').value.trim().toLowerCase();

      if (!email.endsWith('@mackenzista.com.br') && !email.endsWith('@mackenzie.br')) {
        mensagemEl.textContent = 'Utilize um email mackenzista (@mackenzista.com.br ou @mackenzie.br).';
        mensagemEl.className = 'mensagem erro';
        return;
      }

      const aluno = {
        nome: document.getElementById('nome').value.trim(),
        email: email,
        matricula: document.getElementById('matricula').value.trim(),
        curso: document.getElementById('curso').value.trim()
      };

      btnCadastrar.disabled = true;
      btnCadastrar.textContent = 'Cadastrando...';
      mensagemEl.className = 'mensagem';
      mensagemEl.textContent = '';

      try {
        const response = await fetch(`${apiBaseUrl}/alunos`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(aluno)
        });

        if (response.ok) {
          mensagemEl.textContent = 'Aluno cadastrado com sucesso! Você já pode fazer login.';
          mensagemEl.className = 'mensagem sucesso';
          form.reset();
        } else {
          let msg = 'Erro ao cadastrar aluno. (HTTP ' + response.status + ')';
          try { const err = await response.json(); msg = err.message || err.erro || msg; } catch (_) {}
          mensagemEl.textContent = msg;
          mensagemEl.className = 'mensagem erro';
        }
      } catch (error) {
        mensagemEl.textContent = 'Não foi possível conectar ao servidor. Verifique se a aplicação está rodando na porta 8080.';
        mensagemEl.className = 'mensagem erro';
      } finally {
        btnCadastrar.disabled = false;
        btnCadastrar.textContent = 'Cadastrar';
      }
    });
  </script>
</body>
</html>
