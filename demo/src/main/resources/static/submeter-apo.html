<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submeter APO - Sistema APO</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f2f5;
      min-height: 100vh;
    }

    header {
      background-color: #003087;
      color: white;
      padding: 14px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 20px; }

    .aluno-info {
      font-size: 14px;
      opacity: 0.9;
    }

    .btn-sair {
      background: rgba(255,255,255,0.2);
      border: 1px solid rgba(255,255,255,0.5);
      color: white;
      padding: 7px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-sair:hover { background: rgba(255,255,255,0.3); }

    .main {
      max-width: 800px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 28px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 18px;
      color: #003087;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8eef5;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .info-item label {
      font-size: 11px;
      text-transform: uppercase;
      color: #888;
      letter-spacing: 0.5px;
    }

    .info-item p {
      font-size: 15px;
      color: #222;
      margin-top: 2px;
      font-weight: 500;
    }

    .section-title {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      margin-bottom: 12px;
    }

    .item-apo {
      border: 1px solid #dde3eb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      background: #fafbfc;
    }

    .item-apo .item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .item-apo .item-numero {
      font-weight: bold;
      color: #003087;
      font-size: 14px;
    }

    .btn-remover {
      background: none;
      border: none;
      color: #c62828;
      cursor: pointer;
      font-size: 13px;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .btn-remover:hover { background: #fdecea; }

    .form-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr;
      gap: 12px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: bold;
      color: #444;
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #003087;
      box-shadow: 0 0 0 2px rgba(0,48,135,0.1);
    }

    .btn-add-item {
      background: none;
      border: 2px dashed #003087;
      color: #003087;
      width: 100%;
      padding: 11px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .btn-add-item:hover { background: #e8eef5; }

    .btn-submeter {
      width: 100%;
      padding: 14px;
      background-color: #003087;
      color: white;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-submeter:hover { background-color: #00206b; }
    .btn-submeter:disabled { background-color: #aaa; cursor: not-allowed; }

    .mensagem {
      padding: 14px;
      border-radius: 8px;
      text-align: center;
      font-size: 15px;
      margin-top: 14px;
      display: none;
    }

    .mensagem.sucesso { background-color: #e8f5e9; color: #2e7d32; display: block; }
    .mensagem.erro    { background-color: #fdecea; color: #c62828; display: block; }

    .historico-lista { list-style: none; }

    .historico-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .historico-item:last-child { border-bottom: none; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
    }

    .badge-enviada { background: #e3f2fd; color: #1565c0; }
    .badge-pendente { background: #fff8e1; color: #e65100; }
    .badge-aprovada { background: #e8f5e9; color: #2e7d32; }
    .badge-reprovada { background: #fdecea; color: #c62828; }

    .empty-state {
      text-align: center;
      color: #aaa;
      padding: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sistema APO</h1>
    <div class="aluno-info" id="headerNome"></div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </header>

  <div class="main">
    <!-- Student info card -->
    <div class="card">
      <h2>Dados do Aluno</h2>
      <div class="info-grid">
        <div class="info-item">
          <label>Nome</label>
          <p id="alunoNome">—</p>
        </div>
        <div class="info-item">
          <label>Email</label>
          <p id="alunoEmail">—</p>
        </div>
        <div class="info-item">
          <label>Matrícula</label>
          <p id="alunoMatricula">—</p>
        </div>
        <div class="info-item">
          <label>Curso</label>
          <p id="alunoCurso">—</p>
        </div>
      </div>
    </div>

    <!-- APO submission form -->
    <div class="card">
      <h2>Nova Submissão de APO</h2>

      <form id="formAPO">
        <div class="section-title">Atividades e Comprovações</div>

        <div id="listaItens"></div>

        <button type="button" class="btn-add-item" onclick="adicionarItem()">
          + Adicionar Atividade
        </button>

        <button type="submit" class="btn-submeter" id="btnSubmeter" style="margin-top:20px">
          Submeter APO
        </button>
      </form>

      <div id="mensagem" class="mensagem"></div>
    </div>

    <!-- Submission history -->
    <div class="card">
      <h2>Histórico de Solicitações</h2>
      <ul class="historico-lista" id="historicoLista">
        <li class="empty-state">Carregando...</li>
      </ul>
    </div>
  </div>

  <script>
    const aluno = JSON.parse(localStorage.getItem("alunoLogado") || "null");

    if (!aluno) {
      window.location.href = "/login.html";
    }

    // Fill student info
    document.getElementById("headerNome").textContent = aluno.nome;
    document.getElementById("alunoNome").textContent = aluno.nome;
    document.getElementById("alunoEmail").textContent = aluno.email;
    document.getElementById("alunoMatricula").textContent = aluno.matricula;
    document.getElementById("alunoCurso").textContent = aluno.curso;

    let contadorItens = 0;

    function adicionarItem() {
      contadorItens++;
      const idx = contadorItens;
      const div = document.createElement("div");
      div.className = "item-apo";
      div.id = `item-${idx}`;
      div.innerHTML = `
        <div class="item-header">
          <span class="item-numero">Atividade #${idx}</span>
          <button type="button" class="btn-remover" onclick="removerItem(${idx})">Remover</button>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Descrição</label>
            <input type="text" id="desc-${idx}" placeholder="Descreva a atividade" required>
          </div>
          <div class="form-group">
            <label>Tipo</label>
            <select id="tipo-${idx}" required>
              <option value="">Selecione</option>
              <option value="EXTENSAO">Extensão</option>
              <option value="PESQUISA">Pesquisa</option>
              <option value="ESTAGIO">Estágio</option>
              <option value="MONITORIA">Monitoria</option>
              <option value="INICIACAO_CIENTIFICA">Iniciação Científica</option>
              <option value="PROJETO_SOCIAL">Projeto Social</option>
              <option value="OUTRO">Outro</option>
            </select>
          </div>
          <div class="form-group">
            <label>Pontuação</label>
            <input type="number" id="pont-${idx}" min="0" step="0.5" placeholder="0" required>
          </div>
        </div>
      `;
      document.getElementById("listaItens").appendChild(div);
    }

    function removerItem(idx) {
      const el = document.getElementById(`item-${idx}`);
      if (el) el.remove();
    }

    // Add one item by default
    adicionarItem();

    document.getElementById("formAPO").addEventListener("submit", async function (e) {
      e.preventDefault();
      const btn = document.getElementById("btnSubmeter");
      const mensagem = document.getElementById("mensagem");
      btn.disabled = true;
      mensagem.className = "mensagem";
      mensagem.textContent = "";

      const itensDivs = document.querySelectorAll(".item-apo");
      if (itensDivs.length === 0) {
        mensagem.textContent = "Adicione ao menos uma atividade.";
        mensagem.className = "mensagem erro";
        btn.disabled = false;
        return;
      }

      const itens = [];
      let valido = true;

      itensDivs.forEach(div => {
        const idxMatch = div.id.match(/item-(\d+)/);
        if (!idxMatch) return;
        const idx = idxMatch[1];
        const descricao = document.getElementById(`desc-${idx}`).value.trim();
        const tipo = document.getElementById(`tipo-${idx}`).value;
        const pontuacao = parseFloat(document.getElementById(`pont-${idx}`).value);

        if (!descricao || !tipo || isNaN(pontuacao)) {
          valido = false;
          return;
        }
        itens.push({ descricao, tipo, pontuacao });
      });

      if (!valido || itens.length === 0) {
        mensagem.textContent = "Preencha todos os campos de cada atividade.";
        mensagem.className = "mensagem erro";
        btn.disabled = false;
        return;
      }

      try {
        const res = await fetch(`/alunos/${aluno.idPessoa}/submeter-apo`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ itens })
        });

        if (res.ok) {
          mensagem.textContent = "APO submetida com sucesso!";
          mensagem.className = "mensagem sucesso";
          document.getElementById("listaItens").innerHTML = "";
          contadorItens = 0;
          adicionarItem();
          carregarHistorico();
        } else {
          mensagem.textContent = "Erro ao submeter APO. Tente novamente.";
          mensagem.className = "mensagem erro";
        }
      } catch (err) {
        mensagem.textContent = "Erro de conexão com o servidor.";
        mensagem.className = "mensagem erro";
      }

      btn.disabled = false;
    });

    async function carregarHistorico() {
      const lista = document.getElementById("historicoLista");
      try {
        const res = await fetch(`/alunos/${aluno.idPessoa}/solicitacoes`);
        const solicitacoes = await res.json();

        if (solicitacoes.length === 0) {
          lista.innerHTML = '<li class="empty-state">Nenhuma solicitação enviada ainda.</li>';
          return;
        }

        lista.innerHTML = solicitacoes.map(s => {
          const status = s.status || "PENDENTE";
          const badgeClass = {
            "ENVIADA": "badge-enviada",
            "PENDENTE": "badge-pendente",
            "APROVADA": "badge-aprovada",
            "REPROVADA": "badge-reprovada"
          }[status] || "badge-pendente";

          const data = s.dataEnvio ? new Date(s.dataEnvio).toLocaleDateString("pt-BR") : "—";
          const totalPontos = (s.itens || []).reduce((acc, i) => acc + (i.pontuacao || 0), 0);
          const qtdItens = (s.itens || []).length;

          return `
            <li class="historico-item">
              <div>
                <strong>Solicitação #${s.idSolicitacao}</strong>
                <span style="color:#888; font-size:12px; margin-left:8px">${data}</span>
                <br>
                <span style="color:#666; font-size:13px">${qtdItens} atividade(s) · ${totalPontos.toFixed(1)} pontos</span>
              </div>
              <span class="badge ${badgeClass}">${status}</span>
            </li>
          `;
        }).join("");
      } catch (err) {
        lista.innerHTML = '<li class="empty-state">Erro ao carregar histórico.</li>';
      }
    }

    function sair() {
      localStorage.removeItem("alunoLogado");
      window.location.href = "/login.html";
    }

    carregarHistorico();
  </script>
</body>
</html>
